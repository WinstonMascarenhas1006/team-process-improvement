<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Case study · Process Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .case-study-body {
      max-width: 48rem;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }
    .case-study-body h1 {
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 1.85rem;
      color: #0f2940;
      margin-bottom: 1rem;
    }
    .case-study-body h2 {
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 1.25rem;
      margin-top: 2rem;
      color: #1e4d6b;
    }
    .case-study-body table {
      width: 100%;
      margin: 1rem 0;
      font-size: 0.92rem;
    }
    .case-study-body th, .case-study-body td {
      border: 1px solid var(--tblr-border-color);
      padding: 0.5rem 0.65rem;
    }
    .case-study-body th { background: #f7f3ec; }
    .case-study-body code {
      background: rgba(30, 77, 107, 0.08);
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      font-size: 0.88em;
    }
    .case-study-body ol, .case-study-body ul { padding-left: 1.25rem; }
    .case-study-body li { margin-bottom: 0.35rem; }
    .case-cta {
      max-width: 48rem;
      margin: 1rem auto 0;
      padding: 0 1rem;
    }
  </style>
  <script src="js/paths.js"></script>
</head>
<body class="app-body">
  <header class="navbar app-navbar">
    <div class="container-xl d-flex align-items-center justify-content-between py-2">
      <a href="../index.html" class="navbar-brand text-decoration-none">
        <span class="brand-mark"><i class="ti ti-home"></i></span>
        <span class="brand-text"><strong>Portfolio home</strong></span>
      </a>
      <div class="d-flex gap-2">
        <a class="btn btn-sm btn-primary" href="index.html"><i class="ti ti-chart-bar"></i> Analytics dashboard</a>
        <a class="btn btn-sm btn-outline-primary" href="https://github.com/WinstonMascarenhas1006/team-process-improvement/blob/main/docs/case-study.md" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </header>
  <div class="case-cta">
    <div class="alert alert-info mb-0">
      <strong>Next step for recruiters:</strong> open the
      <a href="index.html" class="alert-link">analytics dashboard</a> for sprint KPIs, impediments, retros, timeline, and GitHub commits.
      <a href="../docs/ROLE-FIT.md" class="alert-link ms-1">JD mapping</a>.
    </div>
  </div>
  <article class="case-study-body card card-body" id="content">
    <p class="text-secondary">Loading case study…</p>
  </article>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const mdUrl = assetUrl("docs/case-study.md");
    fetch(mdUrl)
      .then((r) => {
        if (!r.ok) throw new Error("Could not load case study");
        return r.text();
      })
      .then((md) => {
        document.getElementById("content").innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById("content").innerHTML =
          '<p class="text-danger">Could not load the case study. Run <code>python src/run_dashboard.py</code> from the repo root, or use GitHub Pages.</p>';
      });
  </script>
</body>
</html>
